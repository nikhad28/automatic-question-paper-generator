<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - AI Paper Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-robot"></i>
                    <span>AI Paper</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('dashboard') }}">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="{{ url_for('generate_page', paper_type='mcq') }}" {% if paper_type == 'mcq' %}class="active"{% endif %}>
                    <i class="fas fa-list-check"></i>
                    <span>MCQ Generator</span>
                </a>
                <a href="{{ url_for('generate_page', paper_type='descriptive') }}" {% if paper_type == 'descriptive' %}class="active"{% endif %}>
                    <i class="fas fa-pencil"></i>
                    <span>Descriptive Generator</span>
                </a>
                <a href="{{ url_for('generate_page', paper_type='ut') }}" {% if paper_type == 'ut' %}class="active"{% endif %}>
                    <i class="fas fa-file-alt"></i>
                    <span>UT Paper (20M)</span>
                </a>
                <a href="{{ url_for('generate_page', paper_type='semester') }}" {% if paper_type == 'semester' %}class="active"{% endif %}>
                    <i class="fas fa-file-pdf"></i>
                    <span>Semester Paper (80M)</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <a href="{{ url_for('logout') }}">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <h1>{{ title }}</h1>
                    <p>Upload syllabus and generate AI-powered questions</p>
                </div>
                <div class="header-right">
                    <span class="user-badge">
                        <i class="fas fa-user-circle"></i>
                        {{ name }}
                    </span>
                </div>
            </header>

            <section class="generator-section">
                <div class="generator-card">
                    <form id="generateForm">
                        <input type="hidden" name="paper_type" value="{{ paper_type }}">

                        <div class="form-group">
                            <label>
                                <i class="fas fa-file-alt"></i>
                                Syllabus Content
                            </label>
                            <textarea id="syllabus_text" name="syllabus_text" rows="8" 
                                placeholder="Paste your syllabus text here..."></textarea>
                            <p class="help-text">Or upload a file below</p>
                        </div>

                        <div class="form-group">
                            <label>
                                <i class="fas fa-upload"></i>
                                Upload Syllabus File
                            </label>
                            <div class="file-upload">
                                <input type="file" id="syllabus_file" name="syllabus_file" 
                                    accept=".pdf,.docx,.txt,.jpg,.jpeg,.png">
                                <label for="syllabus_file" class="file-label">
                                    <i class="fas fa-cloud-upload-alt"></i>
                                    <span>Click to upload or drag and drop</span>
                                    <small>Supported: PDF, DOCX, TXT, Images</small>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>
                                <i class="fas fa-list-ol"></i>
                                Number of Questions
                            </label>
                            <input type="number" id="num_questions" name="num_questions" 
                                value="10" min="1" max="50">
                        </div>

                        <button type="submit" class="btn btn-primary btn-large btn-full">
                            <i class="fas fa-magic"></i> Generate Questions
                        </button>
                    </form>

                    <div id="loading" class="loading-container" style="display: none;">
                        <div class="spinner"></div>
                        <p>Generating questions using AI...</p>
                    </div>
                </div>

                <!-- Results -->
                <div id="results" class="results-container" style="display: none;">
                    <div class="results-header">
                        <h2>Generated Questions</h2>
                        <div class="results-actions">
                            <button onclick="downloadPaper('pdf')" class="btn btn-success">
                                <i class="fas fa-file-pdf"></i> Download PDF
                            </button>
                            <button onclick="downloadPaper('docx')" class="btn btn-info">
                                <i class="fas fa-file-word"></i> Download Word
                            </button>
                            <button onclick="regeneratePaper()" class="btn btn-outline">
                                <i class="fas fa-redo"></i> Regenerate
                            </button>
                        </div>
                    </div>

                    <div id="questionsDisplay" class="questions-display">
                        <!-- Questions will be rendered here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
